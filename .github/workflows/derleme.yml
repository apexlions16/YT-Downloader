name: Bmobil 0.3.1 Android Oynatma Hotfix

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: bmobil-0-3-1-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android-uygulamalarini-derle:
    name: Bmobil 0.3.1 APK paketlerini oluştur
    runs-on: ubuntu-latest
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android araçlarını kur
        uses: android-actions/setup-android@v3

      - name: Gradle 8.14.2 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.2"

      - name: Android testlerini ve iki APK'yı derle
        id: android-derleme
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle \
            :sharedUI:allTests \
            :androidApp:testNormalReleaseUnitTest \
            :androidApp:testDeveloperReleaseUnitTest \
            :androidApp:assembleNormalRelease \
            :androidApp:assembleDeveloperRelease \
            --stacktrace --console=plain 2>&1 | tee android-derleme.log

      - name: Android paketlerini adlandır
        if: steps.android-derleme.outcome == 'success'
        shell: bash
        run: |
          mkdir -p dagitim/android
          cp androidApp/build/outputs/apk/normal/release/*.apk dagitim/android/Bmobil-0.3.1.apk
          cp androidApp/build/outputs/apk/developer/release/*.apk dagitim/android/Bmobil-Developer-0.3.1.apk
          sha256sum dagitim/android/* | tee android-sha256.txt

      - name: Android derleme günlüğünü yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-Derleme-Gunlugu-0.3.1
          path: |
            android-derleme.log
            android-sha256.txt
          if-no-files-found: warn

      - name: Bmobil paketini yükle
        if: steps.android-derleme.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Bmobil-0.3.1
          path: dagitim/android/Bmobil-0.3.1.apk
          if-no-files-found: error

      - name: Bmobil Developer paketini yükle
        if: steps.android-derleme.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Bmobil-Developer-0.3.1
          path: dagitim/android/Bmobil-Developer-0.3.1.apk
          if-no-files-found: error

      - name: Android derleme sonucunu doğrula
        if: steps.android-derleme.outcome == 'failure'
        shell: bash
        run: |
          echo "Android 0.3.1 derlemesi başarısız oldu. Türkçe günlük artefakt olarak yüklendi."
          exit 1

  pr-ci-sonucunu-kaydet:
    name: PR CI sonucunu dala kaydet
    if: always() && github.event_name == 'pull_request'
    needs:
      - android-uygulamalarini-derle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: PR dalını al
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Android derleme günlüğünü al
        uses: actions/download-artifact@v4
        with:
          name: Android-Derleme-Gunlugu-0.3.1
          path: ci-gunluk

      - name: Sonucu okunabilir dosyaya yaz
        shell: bash
        run: |
          mkdir -p ci
          {
            echo "run_id=${{ github.run_id }}"
            echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "result=${{ needs.android-uygulamalarini-derle.result }}"
            echo "commit=${{ github.event.pull_request.head.sha }}"
            echo
            echo "===== android-derleme.log son 160 satır ====="
            tail -n 160 ci-gunluk/android-derleme.log 2>/dev/null || true
            echo
            echo "===== SHA-256 ====="
            cat ci-gunluk/android-sha256.txt 2>/dev/null || true
          } > ci/android-0.3.1-status.txt

      - name: CI sonucunu PR dalına işle
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/android-0.3.1-status.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Android CI sonucunu kaydet [skip ci]"
          git push origin "HEAD:${{ github.head_ref }}"

  github-release-olustur:
    name: Bmobil 0.3.1 GitHub Release oluştur
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - android-uygulamalarini-derle
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Bmobil paketini al
        uses: actions/download-artifact@v4
        with:
          name: Bmobil-0.3.1
          path: release

      - name: Bmobil Developer paketini al
        uses: actions/download-artifact@v4
        with:
          name: Bmobil-Developer-0.3.1
          path: release

      - name: SHA-256 listesi oluştur
        shell: bash
        run: |
          cd release
          sha256sum * | tee SHA256SUMS.txt

      - name: Sürüm notlarını hazırla
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## Bmobil 0.3.1 Android Oynatma Hotfix

          - Şifreli videolar oynatma öncesinde güvenli geçici dosyaya hazırlanır ve hazırlık durumu görünür.
          - Oynatıcı yalnızca Android ana iş parçacığından açılır.
          - Yerel dosya ve MediaStore URI doğrulaması eklendi.
          - Media3 yerel medya kaynağı ve ayrıntılı hata ekranı eklendi.
          - Android için H.264/AAC uyumlu indirme seçimi önceliklendirildi.
          - Bmobil ve Bmobil Developer APK'ları dahildir.
          EOF

      - name: Bmobil 0.3.1 sürümünü oluştur veya güncelle
        id: release-yayimla
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -o pipefail
          {
            if gh release view v0.3.1 >/dev/null 2>&1; then
              echo "Mevcut v0.3.1 Release güncelleniyor."
              gh release edit v0.3.1 \
                --title "Bmobil 0.3.1 Android Oynatma Hotfix" \
                --notes-file release-notes.md
            else
              echo "Yeni v0.3.1 Release oluşturuluyor."
              gh release create v0.3.1 \
                --target "$GITHUB_SHA" \
                --title "Bmobil 0.3.1 Android Oynatma Hotfix" \
                --notes-file release-notes.md
            fi

            gh release upload v0.3.1 \
              release/Bmobil-0.3.1.apk \
              release/Bmobil-Developer-0.3.1.apk \
              release/SHA256SUMS.txt \
              --clobber

            gh release view v0.3.1 --json url,tagName,name,isDraft,isPrerelease
          } 2>&1 | tee release.log

      - name: Release günlüğünü yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release-Gunlugu-0.3.1
          path: release.log
          if-no-files-found: warn

      - name: Geliştirme günlüğüne Release bağlantısı yaz
        if: steps.release-yayimla.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue comment 6 --body "✅ **Bmobil 0.3.1 Android oynatma hotfix Release yayımlandı.**\n\nİki APK ve SHA-256 listesi: https://github.com/${{ github.repository }}/releases/tag/v0.3.1\n\nAna dal Action çalışması: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Release sonucunu doğrula
        if: steps.release-yayimla.outcome == 'failure'
        shell: bash
        run: |
          echo "GitHub Release yayımlanamadı. Ayrıntılar Android-Release-Gunlugu-0.3.1 artefaktındadır."
          exit 1

  main-ci-sonucunu-kaydet:
    name: Ana dal CI ve Release sonucunu kaydet
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - android-uygulamalarini-derle
      - github-release-olustur
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ana dalı al
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Android derleme günlüğünü al
        uses: actions/download-artifact@v4
        with:
          name: Android-Derleme-Gunlugu-0.3.1
          path: ci-gunluk

      - name: Release günlüğünü al
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: Android-Release-Gunlugu-0.3.1
          path: ci-release

      - name: Ana dal sonucunu okunabilir dosyaya yaz
        shell: bash
        run: |
          mkdir -p ci
          {
            echo "run_id=${{ github.run_id }}"
            echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "android_result=${{ needs.android-uygulamalarini-derle.result }}"
            echo "release_result=${{ needs.github-release-olustur.result }}"
            echo "commit=${{ github.sha }}"
            echo
            echo "===== release.log ====="
            cat ci-release/release.log 2>/dev/null || true
            echo
            echo "===== android-derleme.log son 120 satır ====="
            tail -n 120 ci-gunluk/android-derleme.log 2>/dev/null || true
            echo
            echo "===== SHA-256 ====="
            cat ci-gunluk/android-sha256.txt 2>/dev/null || true
          } > ci/android-0.3.1-main-status.txt

      - name: Ana dal sonucunu işle
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/android-0.3.1-main-status.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Android 0.3.1 ana dal CI sonucunu kaydet [skip ci]"
          git push origin HEAD:main
