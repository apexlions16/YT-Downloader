name: Bmobil ve BPC 0.3.0 Derlemesi

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: bmobil-bpc-0-3-0-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android-uygulamalarini-derle:
    name: Bmobil APK paketlerini oluştur
    runs-on: ubuntu-latest
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android araçlarını kur
        uses: android-actions/setup-android@v3

      - name: Gradle 8.14.2 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.2"

      - name: Bmobil ve Bmobil Developer APK'larını derle
        id: android-derleme
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle :sharedUI:allTests :androidApp:assembleNormalRelease :androidApp:assembleDeveloperRelease --stacktrace --console=plain 2>&1 | tee android-derleme.log

      - name: Android paketlerini adlandır
        if: steps.android-derleme.outcome == 'success'
        shell: bash
        run: |
          mkdir -p dagitim/android
          cp androidApp/build/outputs/apk/normal/release/*.apk dagitim/android/Bmobil-0.3.0.apk
          cp androidApp/build/outputs/apk/developer/release/*.apk dagitim/android/Bmobil-Developer-0.3.0.apk
          sha256sum dagitim/android/* | tee android-sha256.txt

      - name: Android derleme günlüğünü yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-Derleme-Gunlugu-0.3.0
          path: |
            android-derleme.log
            android-sha256.txt
          if-no-files-found: warn

      - name: Bmobil paketini yükle
        if: steps.android-derleme.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Bmobil-0.3.0
          path: dagitim/android/Bmobil-0.3.0.apk
          if-no-files-found: error

      - name: Bmobil Developer paketini yükle
        if: steps.android-derleme.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Bmobil-Developer-0.3.0
          path: dagitim/android/Bmobil-Developer-0.3.0.apk
          if-no-files-found: error

      - name: Android derleme sonucunu doğrula
        if: steps.android-derleme.outcome == 'failure'
        shell: bash
        run: |
          echo "Android derlemesi başarısız oldu. Türkçe günlük artefakt olarak yüklendi."
          exit 1

  windows-uygulamalarini-derle:
    name: BPC MSI ve EXE paketlerini oluştur
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle 8.14.2 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.2"

      - name: Windows motor bileşenlerini indir ve doğrula
        id: motor-hazirla
        shell: pwsh
        run: |
          ./scripts/windows-motor-hazirla.ps1 -GunlukYolu windows-motor.log

      - name: Windows motor günlüğünü yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Motor-Gunlugu-0.3.0
          path: |
            windows-motor.log
            windows-motor-sha256.txt
          if-no-files-found: warn

      - name: BPC ve BPC Developer paketlerini derle
        id: windows-derleme
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          & gradle :desktopApp:test :desktopApp:packageMsi :desktopApp:packageExe --stacktrace --console=plain *>&1 | Tee-Object -FilePath windows-normal-derleme.log
          $normalKod = $LASTEXITCODE
          & gradle :desktopApp:packageMsi :desktopApp:packageExe -PdeveloperSurumu=true --stacktrace --console=plain *>&1 | Tee-Object -FilePath windows-developer-derleme.log
          $developerKod = $LASTEXITCODE
          if ($normalKod -ne 0 -or $developerKod -ne 0) { exit 1 }

      - name: Windows paketlerini adlandır
        if: steps.windows-derleme.outcome == 'success'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dagitim/windows" | Out-Null
          Copy-Item (Get-ChildItem "desktopApp/build/normal/compose/binaries/main/msi" -Filter *.msi | Select-Object -First 1).FullName "dagitim/windows/BPC-0.3.0.msi"
          Copy-Item (Get-ChildItem "desktopApp/build/normal/compose/binaries/main/exe" -Filter *.exe | Select-Object -First 1).FullName "dagitim/windows/BPC-0.3.0.exe"
          Copy-Item (Get-ChildItem "desktopApp/build/developer/compose/binaries/main/msi" -Filter *.msi | Select-Object -First 1).FullName "dagitim/windows/BPC-Developer-0.3.0.msi"
          Copy-Item (Get-ChildItem "desktopApp/build/developer/compose/binaries/main/exe" -Filter *.exe | Select-Object -First 1).FullName "dagitim/windows/BPC-Developer-0.3.0.exe"
          Get-ChildItem "dagitim/windows" | ForEach-Object {
            "$($_.Name) $((Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant())"
          } | Set-Content -Encoding UTF8 windows-sha256.txt

      - name: Windows derleme günlüklerini yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Derleme-Gunlugu-0.3.0
          path: |
            windows-normal-derleme.log
            windows-developer-derleme.log
            windows-sha256.txt
          if-no-files-found: warn

      - name: BPC MSI paketini yükle
        if: steps.windows-derleme.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: BPC-MSI-0.3.0
          path: dagitim/windows/BPC-0.3.0.msi
          if-no-files-found: error

      - name: BPC EXE paketini yükle
        if: steps.windows-derleme.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: BPC-EXE-0.3.0
          path: dagitim/windows/BPC-0.3.0.exe
          if-no-files-found: error

      - name: BPC Developer MSI paketini yükle
        if: steps.windows-derleme.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: BPC-Developer-MSI-0.3.0
          path: dagitim/windows/BPC-Developer-0.3.0.msi
          if-no-files-found: error

      - name: BPC Developer EXE paketini yükle
        if: steps.windows-derleme.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: BPC-Developer-EXE-0.3.0
          path: dagitim/windows/BPC-Developer-0.3.0.exe
          if-no-files-found: error

      - name: Windows derleme sonucunu doğrula
        if: steps.windows-derleme.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Host "Windows derlemesi başarısız oldu. Türkçe günlüklar artefakt olarak yüklendi."
          exit 1

  github-release-olustur:
    name: GitHub Release oluştur
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - android-uygulamalarini-derle
      - windows-uygulamalarini-derle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Bmobil paketini al
        uses: actions/download-artifact@v4
        with:
          name: Bmobil-0.3.0
          path: release

      - name: Bmobil Developer paketini al
        uses: actions/download-artifact@v4
        with:
          name: Bmobil-Developer-0.3.0
          path: release

      - name: BPC MSI paketini al
        uses: actions/download-artifact@v4
        with:
          name: BPC-MSI-0.3.0
          path: release

      - name: BPC EXE paketini al
        uses: actions/download-artifact@v4
        with:
          name: BPC-EXE-0.3.0
          path: release

      - name: BPC Developer MSI paketini al
        uses: actions/download-artifact@v4
        with:
          name: BPC-Developer-MSI-0.3.0
          path: release

      - name: BPC Developer EXE paketini al
        uses: actions/download-artifact@v4
        with:
          name: BPC-Developer-EXE-0.3.0
          path: release

      - name: SHA-256 listesi oluştur
        shell: bash
        run: |
          cd release
          sha256sum * | tee SHA256SUMS.txt

      - name: Bmobil ve BPC 0.3.0 sürümünü yayımla
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          name: Bmobil ve BPC 0.3.0
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Bmobil ve BPC 0.3.0

            - Android ve Windows oynatıcıları düzeltildi.
            - İndirilen ses/dublaj ve altyazı parçaları oynatıcıdan seçilebilir.
            - Windows motorları kurulum paketine gömüldü; ilk indirme ağ tabanlı kuruluma bağlı değildir.
            - Bmobil ve BPC şifreli kütüphane sürümleridir.
            - Bmobil Developer ve BPC Developer dosyaları normal depolamaya açık biçimde kaydeder.
          files: |
            release/Bmobil-0.3.0.apk
            release/Bmobil-Developer-0.3.0.apk
            release/BPC-0.3.0.msi
            release/BPC-0.3.0.exe
            release/BPC-Developer-0.3.0.msi
            release/BPC-Developer-0.3.0.exe
            release/SHA256SUMS.txt
          fail_on_unmatched_files: true
